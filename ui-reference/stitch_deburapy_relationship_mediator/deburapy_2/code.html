  body {
    background-color: theme('colors.background');
    color: theme('colors.on-background');
    font-family: theme('fontFamily.body-md');
  }

<body class="antialiased">
<div class="relative flex h-auto min-h-screen w-full flex-col bg-background group/design-root overflow-x-hidden">
<div class="layout-container flex h-full grow flex-col">
<div class="px-container-padding-mobile md:px-container-padding-desktop flex flex-1 justify-center py-5">
<div class="layout-content-container flex flex-col w-full max-w-[960px] flex-1">
<header class="flex items-center justify-between whitespace-nowrap border-b border-solid border-outline-variant px-4 md:px-10 py-3 mb-8">
<div class="flex items-center gap-4 text-on-background">
<button aria-label="Go back" class="p-2 -ml-2 rounded-full hover:bg-surface-variant transition-colors text-on-surface-variant">
<span class="material-symbols-outlined">arrow_back</span>
</button>
<h2 class="text-headline-md font-headline-md">Settings</h2>
</div>
<div class="flex flex-1 justify-end gap-8"><div class="flex items-center gap-9"></div></div>
</header>
<main class="flex flex-col gap-8 px-4 md:px-0 pb-12">
<!-- Mediator Setup Section -->
<section class="flex flex-col gap-6">
<h1 class="text-headline-lg font-headline-lg text-primary">Mediator Setup</h1>
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<label class="flex flex-col">
<span class="text-label-md font-label-md text-on-surface-variant mb-2">Mediator Name</span>
<input class="form-input flex w-full rounded-xl text-body-md font-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary border border-outline-variant bg-surface-container-lowest h-14 placeholder:text-on-surface-variant/50 px-4 transition-shadow" placeholder="Enter Name" value="Mediator One"/>
</label>
<label class="flex flex-col">
<span class="text-label-md font-label-md text-on-surface-variant mb-2">Mediator Model</span>
<select class="form-select flex w-full rounded-xl text-body-md font-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary border border-outline-variant bg-surface-container-lowest h-14 px-4 transition-shadow appearance-none cursor-pointer">
<option value="gpt4">GPT-4 Turbo</option>
<option value="claude3">Claude 3 Opus</option>
<option value="gemini">Gemini Pro</option>
</select>
</label>
<label class="flex flex-col md:col-span-2">
<span class="text-label-md font-label-md text-on-surface-variant mb-2">System Prompt</span>
<textarea class="form-textarea flex w-full rounded-xl text-body-md font-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary border border-outline-variant bg-surface-container-lowest min-h-[160px] p-4 placeholder:text-on-surface-variant/50 resize-y transition-shadow" placeholder="Enter system instructions for the mediator..."></textarea>
<p class="text-label-sm font-label-sm text-on-surface-variant mt-2 opacity-80">Define the core behavior and rules for the mediator AI.</p>
</label>
</div>
</section>
<hr class="border-outline-variant/50"/>
<!-- AI Companion Section -->
<section class="flex flex-col gap-6">
<h1 class="text-headline-lg font-headline-lg text-primary">AI Companion</h1>
<div class="grid grid-cols-1 md:grid-cols-2 gap-gutter">
<label class="flex flex-col">
<span class="text-label-md font-label-md text-on-surface-variant mb-2">Companion Name</span>
<input class="form-input flex w-full rounded-xl text-body-md font-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary border border-outline-variant bg-surface-container-lowest h-14 placeholder:text-on-surface-variant/50 px-4 transition-shadow" placeholder="Enter Companion Name" value="Companion AI"/>
</label>
<label class="flex flex-col">
<span class="text-label-md font-label-md text-on-surface-variant mb-2">Companion Model</span>
<select class="form-select flex w-full rounded-xl text-body-md font-body-md text-on-surface focus:outline-none focus:ring-2 focus:ring-primary border border-outline-variant bg-surface-container-lowest h-14 px-4 transition-shadow appearance-none cursor-pointer">
<option value="gpt35">GPT-3.5</option>
<option value="claude3sonnet">Claude 3 Sonnet</option>
<option value="llama3">Llama 3</option>
</select>
</label>
</div>
</section>
<div class="mt-8 flex flex-col-reverse md:flex-row items-center justify-end gap-4 border-t border-outline-variant pt-6">
<button class="w-full md:w-auto px-6 py-3 rounded-full text-label-md font-label-md text-error hover:bg-error-container transition-colors focus:ring-2 focus:ring-error focus:outline-none">
            Clear Keys
        </button>
<button class="w-full md:w-auto px-8 py-3 rounded-full text-label-md font-label-md bg-primary text-on-primary hover:bg-primary/90 transition-colors shadow-sm focus:ring-2 focus:ring-primary focus:ring-offset-2 focus:ring-offset-background focus:outline-none">
            Save Settings
        </button>
</div>
</main>
</div>
</div>
</div>
</div>
