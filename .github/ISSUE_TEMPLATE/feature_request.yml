name: Feature request
description: Suggest an idea or improvement for Deburapy.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please skim the scope and non-goals in `CONTRIBUTING.md`
        so the proposal fits the project's direction.
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and where does Deburapy fall short today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Rough sketches and API shapes welcome.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why they fall short.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      options:
        - label: I have read the scope / non-goals in CONTRIBUTING.md and believe this fits.
          required: true
        - label: This does not require sending user data or API keys off the local machine by default.
          required: true
