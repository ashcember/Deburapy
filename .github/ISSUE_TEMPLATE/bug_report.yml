name: Bug report
description: Report a reproducible Deburapy bug without private relationship data.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include API keys, private transcripts, session notes, unredacted provider logs, or personal relationship data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Use redacted or fictional data only.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Web UI
        - Local API
        - MCP server
        - BYOK provider
        - Session notes
        - Skills or prompts
        - Documentation
        - Other
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "node --version"
  - type: textarea
    id: logs
    attributes:
      label: Redacted logs or screenshots
      description: Redact secrets, transcripts, headers, and personal data.

